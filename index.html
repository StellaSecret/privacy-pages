<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stella Secret — Politiques de confidentialité</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #2a2f3d;
    --text: #e8eaf0;
    --muted: #9ca3af;
    --accent: #4f9cf9;
    --green: #10d9a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .container { max-width: 560px; width: 100%; }

  header { text-align: center; margin-bottom: 48px; }
  .brand {
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--muted); }

  .app-list { display: flex; flex-direction: column; gap: 12px; }

  .app-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    text-decoration: none;
    transition: border-color .2s, transform .15s;
  }
  .app-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .app-info { flex: 1; }
  .app-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .app-desc { font-size: 13px; color: var(--muted); }
  .app-arrow { color: var(--accent); font-size: 20px; flex-shrink: 0; }

  footer { margin-top: 48px; font-size: 12px; color: var(--muted); text-align: center; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand">Stella Secret</div>
    <h1>Politiques de confidentialité</h1>
    <p class="subtitle">Sélectionnez une application pour consulter sa politique de confidentialité.</p>
  </header>

  <div class="app-list">

    <a href="asthmetrack/privacy.html" class="app-card">
      <div class="app-info">
        <div class="app-name">AsthmeTrack</div>
        <div class="app-desc">Suivi asthme — DEP, SpO₂, Easyhaler</div>
      </div>
      <div class="app-arrow">→</div>
    </a>

    <a href="tripmind/privacy.html" class="app-card">
      <div class="app-info">
        <div class="app-name">TripMind</div>
        <div class="app-desc">Assistant de déplacement intelligent pour la France</div>
      </div>
      <div class="app-arrow">→</div>
    </a>

    <!-- Ajouter d'autres apps ici :
    <a href="autreapp/privacy.html" class="app-card">
      <div class="app-info">
        <div class="app-name">Autre App</div>
        <div class="app-desc">Description courte</div>
      </div>
      <div class="app-arrow">→</div>
    </a>
    -->

  </div>

  <footer>
    <p>© 2025 Stella Secret · <a href="mailto:thaikhuevincent.nguyen@gmail.com">Contact</a></p>
  </footer>

</div>
</body>
</html>
